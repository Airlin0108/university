<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class ="container">
    <h1>Gestion de estudiantes</h1> 
    <div>
        <h2>Nuevo estudiante</h2>
        <form id ="student-form" action="">
            <input type="hidden" id="student-id">
            <div>
                <label for="name">Nombre</label>
                <input type="text" id=name" name="name" required minlength="2" placeholder="Digite nombre">
            </div>
            <div>
                <label for="name">Edad</label>
                <input type="number" id=age" name="age" required min="1" placeholder="Digite su edad">
            </div>
            <div>
                <label for="name">Nota</label>
                <input type="number" id=grade" name="grade" required min="2" max="5" placeholder="Digite nota 0-5">
            </div>
            <div>
                <button type="submit" id="submit-btn">Guardar</button>
                <button type ="button">Cancelar</button>
            </div>
        </form>
    </div>
    <div>
        <h2>Lista de estudiantes</h2>
        <table>
            <thead>
                <tr>
                    <td>ID</td>
                    <td>Nombre</td>
                    <td>Edad</td>
                    <td>Nota</td>
                    <td>Acciones</td>
                </tr>
            </thead>
            <tbody id="student-list">

            </tbody>
        </table>
    </div>
    <script src="index.js"></script>
</body>
</html>
